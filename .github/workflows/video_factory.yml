name: 50-Bot Factory Final Engine

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HUGGINGFACE_KEY: ${{ secrets.HUGGINGFACE_KEY }}

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3

    - name: 2. Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install Heavy Engines (FFmpeg & ImageMagick)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg imagemagick
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: 4. Install Radar & AI Libraries
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests gtts pillow moviepy==1.0.3 numpy==1.24.3 duckduckgo-search feedparser

    - name: 5. Execute Radar & Brain (manager.py)
      run: python manager.py

    - name: 6. Execute Master Factory (master_factory.py)
      run: python master_factory.py

    - name: 7. Execute QC Bot (qc_bot.py)
      run: python qc_bot.py

    - name: 8. Save Video to Cloud (The Black Hole Fix)
      uses: actions/upload-artifact@v4
      with:
        name: Final_Viral_Tech_Video
        path: final_tech_viral_video.mp4
