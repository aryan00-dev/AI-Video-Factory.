name: AI Video Factory Automation

on:
  workflow_dispatch: # Manual 'Run workflow' button ke liye

jobs:
  build-and-generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg (For Video Editing)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests gTTS

      - name: Run Master Factory Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_KEY: ${{ secrets.HUGGINGFACE_KEY }}
        run: |
          python master_factory.py

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Final-AI-Video
          path: final_video.mp4
