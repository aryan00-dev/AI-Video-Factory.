name: 50-Bot Factory Final Engine

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HUGGINGFACE_KEY: ${{ secrets.HUGGINGFACE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Heavy Engines & BYPASS ImageMagick Security
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: Install Python Libraries (Pillow Locked)
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests gtts pillow==9.5.0 moviepy==1.0.3 numpy==1.24.3 duckduckgo-search playwright groq
        python -m playwright install chromium --with-deps

    - name: Execute Radar & Brain (Groq Agent 1)
      run: python manager.py

    - name: Execute Master Factory (Groq Agent 2 + Vault Engine)
      run: python master_factory.py

    - name: Execute QC Bot
      run: python qc_bot.py

    - name: Save Video to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Final_Viral_Tech_Video
        path: final_tech_viral_video.mp4
