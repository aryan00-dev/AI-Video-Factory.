name: 50-Bot Factory Auto-Engine

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HUGGINGFACE_KEY: ${{ secrets.HUGGINGFACE_KEY }}

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3

    - name: 2. Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install Heavy Engines (FFmpeg & ImageMagick)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg imagemagick
        # Fixing ImageMagick policy to allow Text Rendering (The Ultimate Bypass)
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: 4. Install AI Libraries
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests gtts pillow moviepy==1.0.3 openai-whisper numpy numpy==1.24.3

    - name: 5. Run Limitless Manager (Brain Trigger)
      run: python manager.py

    - name: 6. Run Master Factory (Typography & Final Render)
      run: python master_factory.py
